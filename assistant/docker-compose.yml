services:

  # ── Assistant Backend (FastAPI / ReAct agent) ────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8200:8200"
    env_file:
      - path: .env
        required: false
    environment:
      - GATEWAY_URL=${GATEWAY_URL:-http://host.docker.internal:4000}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY:-sk-assistant}
      - GATEWAY_MODEL=${GATEWAY_MODEL:-openai/gpt-4o}
      - CORS_ORIGINS=http://localhost:8300,http://localhost:3000
    volumes:
      - assistant_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8200/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── Assistant Frontend (React / Vite → nginx) ────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8300:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  assistant_data:
