services:

  # ── Redis — pub/sub SSE + leader election scheduler ──────────
  redis:
    image: redis:7.4.9-alpine
    restart: unless-stopped
    networks:
      - default
      - observability_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Assistant Backend (FastAPI / ReAct agent) ────────────────
  backend:
    image: ghcr.io/toussaintgarinat-crypto/workspace/assistant-backend:${ASSISTANT_IMAGE_TAG:-latest}
    build:
      # Repo root pour accéder à ./shared/ (paquet partagé S95).
      context: ..
      dockerfile: assistant/backend/Dockerfile
      args:
        LOCAL_VOICE_ENABLED: ${LOCAL_VOICE_ENABLED:-false}
    ports:
      - "8200:8200"
    env_file:
      - path: .env
        required: false
    environment:
      - GATEWAY_URL=${GATEWAY_URL:-http://localhost:4000}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY:-sk-assistant}
      - GATEWAY_MASTER_KEY=${GATEWAY_MASTER_KEY:-}
      - GATEWAY_MODEL=${GATEWAY_MODEL:-openai/gpt-4o}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8300,http://localhost:3000}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://localhost:8080}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-forge}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-assistant-app}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - VAULT_SECRET=${VAULT_SECRET:-}
      - DATABASE_URL=${ASSISTANT_DATABASE_URL:-}
      - REDIS_URL=${ASSISTANT_REDIS_URL:-redis://redis:6379}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - RAG_ENABLED=${RAG_ENABLED:-true}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - RAG_MIN_SCORE=${RAG_MIN_SCORE:-0.7}
      - SUMMARIZE_ENABLED=${SUMMARIZE_ENABLED:-true}
      - SUMMARIZE_THRESHOLD=${SUMMARIZE_THRESHOLD:-20}
      - LOCAL_VOICE_ENABLED=${LOCAL_VOICE_ENABLED:-false}
      - WHISPER_LOCAL_MODEL=${WHISPER_LOCAL_MODEL:-base}
      - KOKORO_VOICE=${KOKORO_VOICE:-af_heart}
      - KOKORO_LANG=${KOKORO_LANG:-a}
    volumes:
      - assistant_data:/data
      - model_cache:/root/.cache
      - shared_data:/shared
      - storage_data:/storage
    networks:
      - default
      - observability_net
      - proxy_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8200/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── Assistant Frontend (React / Vite → nginx) ────────────────
  frontend:
    image: ghcr.io/toussaintgarinat-crypto/workspace/assistant-frontend:${ASSISTANT_IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8300:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Kiwix — Wikipedia offline (connaissance LAN) ───────────────────────────
  # Télécharger un ZIM : bash scripts/download_zim.sh fr_mini
  # Démarrage sans ZIM : kiwix démarre, catalog vide, tool renvoie []
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:3.8.2
    command: ["--library", "/data/"]
    volumes:
      - ${ZIM_PATH:-/opt/assistant/zim}:/data
    ports:
      - "127.0.0.1:8090:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Updater sidecar — déclenche docker compose pull+up sans SSH ──────────────
  # Démarrage : docker compose --profile sidecars up -d
  updater:
    profiles: [sidecars]
    build:
      context: ./sidecars/updater
    environment:
      - COMPOSE_DIR=${COMPOSE_DIR:-/opt/assistant}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - shared_data:/shared
      - ${COMPOSE_DIR:-/opt/assistant}:/workspace:ro
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test $(($(date +%s) - $(stat -c %Y /tmp/updater_last_run 2>/dev/null || echo 0))) -lt 30"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Disk collector sidecar — usage disque sans SSH ────────────────────────
  # Démarrage : docker compose --profile sidecars up -d
  disk_collector:
    profiles: [sidecars]
    build:
      context: ./sidecars/disk-collector
    environment:
      - STORAGE_PATH=${STORAGE_PATH:-/host/opt/assistant/storage}
    volumes:
      - /:/host:ro
      - storage_data:/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test $(($(date +%s) - $(stat -c %Y /storage/disk-info.json 2>/dev/null || echo 0))) -lt 300"]
      interval: 120s
      timeout: 5s
      retries: 3

volumes:
  assistant_data:
  model_cache:
  shared_data:
  storage_data:

networks:
  default:
  observability_net:
    external: true
    name: observability_net
  proxy_net:
    external: true
    name: proxy_net
