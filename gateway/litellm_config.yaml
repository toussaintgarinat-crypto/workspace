virtual_keys:
  - key: sk-forge
    key_alias: forge
    max_budget: 10
    budget_duration: 1mo
    models: auto

  - key: sk-mempalace
    key_alias: mempalace
    max_budget: 5
    budget_duration: 1mo
    models:
      - openai/gpt-4o-mini
      - google/gemini-2.5-flash-preview
      - ollama/llama3.2
      - ollama/llama3.3

  - key: sk-assistant
    key_alias: assistant
    max_budget: 10
    budget_duration: 1mo
    models: auto
