services:

  gateway:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    env_file:
      - path: .env
        required: false
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LITELLM_CONFIG=/app/config.yaml
      # Sur Mac : http://host.docker.internal:11434
      # Sur HP  : http://NETBIRD_MAC_IP:11434  (IP NetBird du Mac)
      - OLLAMA_MAC_URL=${OLLAMA_MAC_URL:-http://host.docker.internal:11434}
      # Sur HP : http://10.10.10.60:11434 (LXC ollama-hp)
      - OLLAMA_HP_URL=${OLLAMA_HP_URL:-http://host.docker.internal:11434}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
      - gateway_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  gateway_data:
