version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16.14-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge}
      POSTGRES_DB: ${POSTGRES_DB:-forge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forge}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Keycloak (SSO / OIDC) ───────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-forge}
      - KC_DB_USERNAME=${POSTGRES_USER:-forge}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD:-forge}
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  # ── Qdrant ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Core API (TypeScript / Bun / Hono) ─────────────────────
  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    command: ["bun", "run", "src/index.ts"]
    volumes:
      - ./core/src:/app/src
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://forge:forge@postgres:5432/forge
      - QDRANT_URL=http://qdrant:6333
      - ML_MODULE_URL=http://ml-module:8001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-ollama}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-llama3.2}
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-forge}
      - NETBIRD_API_URL=${NETBIRD_API_URL:-https://api.netbird.io}
      - NETBIRD_TOKEN=${NETBIRD_TOKEN:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── ML Module (Python / FastAPI) ────────────────────────────
  ml-module:
    build:
      context: ./ml-module
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8001/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── NetBird Signal ──────────────────────────────────────────
  netbird-signal:
    image: netbirdio/signal:0.71.1
    ports:
      - "10000:10000"
    volumes:
      - netbird_signal_data:/var/lib/netbird
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 10000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── NetBird Management ──────────────────────────────────────
  netbird-management:
    image: netbirdio/management:0.71.1
    ports:
      - "33073:33073"
    entrypoint: ["/bin/sh", "/etc/netbird/entrypoint.sh"]
    command: ["--port", "33073", "--log-level", "info", "--disable-anonymous-metrics"]
    environment:
      - NETBIRD_DATASTORE_ENCRYPTION_KEY=${NETBIRD_DATASTORE_ENCRYPTION_KEY}
    volumes:
      - netbird_mgmt_data:/var/lib/netbird
      - ./netbird/management.json:/etc/netbird/management.json.template:ro
      - ./netbird/entrypoint.sh:/etc/netbird/entrypoint.sh:ro
    depends_on:
      - keycloak
      - netbird-signal
      - coturn
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 33073 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── NetBird Dashboard ───────────────────────────────────────
  netbird-dashboard:
    image: netbirdio/dashboard:0.71.1
    ports:
      - "8088:80"
    environment:
      - AUTH_CLIENT_ID=netbird-client
      - AUTH_AUDIENCE=netbird-client
      - AUTH_AUTHORITY=http://localhost:8080/realms/forge
      - AUTH_SUPPORTED_SCOPES=openid profile email offline_access api
      - AUTH_REDIRECT_URI=/callback
      - AUTH_SILENT_REDIRECT_URI=/silent-callback
      - NETBIRD_MGMT_API_ENDPOINT=http://localhost:33073
      - NETBIRD_SIGNAL_ENDPOINT=ws://localhost:10000
      - USE_AUTH0=false
    depends_on:
      - netbird-management
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Coturn (STUN / TURN) ────────────────────────────────────
  coturn:
    image: coturn/coturn:4.11.0
    ports:
      - "3478:3478/udp"
    volumes:
      - ./netbird/turnserver.conf:/etc/coturn/turnserver.conf
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3478 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Dozzle (log viewer — LAN-only) ─────────────────────────
  dozzle:
    image: amir20/dozzle:v10.0
    ports:
      - "127.0.0.1:9998:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_ENABLE_ACTIONS=false
      - DOZZLE_ENABLE_SHELL=false
      - DOZZLE_NO_ANALYTICS=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Frontend (React / Vite) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  netbird_signal_data:
  netbird_mgmt_data:
