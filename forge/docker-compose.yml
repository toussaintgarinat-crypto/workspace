version: '3.9'

services:

  # ── etcd (Patroni DCS — Phase A: single node) ───────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_NAME: forge-node1
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: "forge-node1=http://etcd:2380"
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: forge-etcd
      ETCD_DATA_DIR: /bitnami/etcd/data
    volumes:
      - etcd_data:/bitnami/etcd
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── PostgreSQL via Patroni (remplace standalone postgres) ────
  # Phase B : ajouter patroni-replica + etcd nodes HP+N2+Pi → voir docs/runbooks/postgres-failover.md
  postgres:
    build:
      context: ../infra/postgres-ha
    image: patroni-pg16:local
    environment:
      PATRONI_NAME: forge-node1
      PATRONI_SCOPE: forge-pg
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: postgres:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: postgres:5432
      PATRONI_POSTGRESQL_DATA_DIR: /var/lib/postgresql/data
      PATRONI_ETCD3_HOSTS: etcd:2379
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres_super_secret_change_me}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${REPLICATOR_PASSWORD:-replicator_secret_change_me}
      PATRONI_REWIND_USERNAME: rewind_user
      PATRONI_REWIND_PASSWORD: ${REWIND_PASSWORD:-rewind_secret_change_me}
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge_secret_change_this}
      POSTGRES_DB: ${POSTGRES_DB:-forge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - wal_archive:/var/lib/postgresql/wal_archive
      - ../infra/postgres-ha/forge/patroni.yml:/etc/patroni/patroni.yml:ro
    ports:
      - "${FORGE_POSTGRES_PORT:-5432}:5432"
      - "${FORGE_PG_PATRONI_PORT:-8008}:8008"
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # ── pgBouncer (pooler façade — prêt Phase B failover) ────────
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p1
    environment:
      DB_USER: ${POSTGRES_USER:-forge}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-forge_secret_change_this}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB:-forge}
      POOL_MODE: session
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
      AUTH_TYPE: md5
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Keycloak : géré par infra/keycloak (réseau partagé proxy_net) ─
  # forge::core et netbird-management résolvent `keycloak` via proxy_net.
  # Lance d'abord : (cd ../infra/keycloak && docker compose up -d)
  # Le doublon Keycloak interne au stack forge a été retiré pour permettre
  # un vrai SSO entre Forge / Assistant / MemPalace / Calendar.
  # (forge/docker-compose.standalone.yml conserve son Keycloak embarqué.)

  # ── Qdrant ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Core API (TypeScript / Bun / Hono) ─────────────────────
  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    command: ["bun", "run", "src/index.ts"]
    volumes:
      - ./core/src:/app/src
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge_secret_change_this}@pgbouncer:5432/${POSTGRES_DB:-forge}
      - QDRANT_URL=http://qdrant:6333
      - ML_MODULE_URL=http://ml-module:8001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-ollama}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-llama3.2}
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-forge}
      - NETBIRD_API_URL=${NETBIRD_API_URL:-https://api.netbird.io}
      - NETBIRD_TOKEN=${NETBIRD_TOKEN:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      # L'image oven/bun n'a ni wget ni curl → on utilise le runtime bun (toujours présent).
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - default
      - proxy_net   # pour atteindre infra/keycloak::keycloak
    restart: unless-stopped

  # ── ML Module (Python / FastAPI) ────────────────────────────
  ml-module:
    build:
      context: ./ml-module
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8001/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── NetBird Signal ──────────────────────────────────────────
  netbird-signal:
    image: netbirdio/signal:0.71.1
    ports:
      - "${FORGE_NETBIRD_SIGNAL_PORT:-10000}:10000"
    volumes:
      - netbird_signal_data:/var/lib/netbird
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 10000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── NetBird Management ──────────────────────────────────────
  netbird-management:
    image: netbirdio/management:0.71.1
    ports:
      - "${FORGE_NETBIRD_MGMT_PORT:-33073}:33073"
    entrypoint: ["/bin/sh", "/etc/netbird/entrypoint.sh"]
    command: ["--port", "33073", "--log-level", "info", "--disable-anonymous-metrics"]
    environment:
      - NETBIRD_DATASTORE_ENCRYPTION_KEY=${NETBIRD_DATASTORE_ENCRYPTION_KEY}
    volumes:
      - netbird_mgmt_data:/var/lib/netbird
      - ./netbird/management.json:/etc/netbird/management.json.template:ro
      - ./netbird/entrypoint.sh:/etc/netbird/entrypoint.sh:ro
    depends_on:
      - netbird-signal
      - coturn
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 33073 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default
      - proxy_net   # JWKS validation via infra/keycloak
    restart: unless-stopped

  # ── NetBird Dashboard ───────────────────────────────────────
  netbird-dashboard:
    image: netbirdio/dashboard:0.71.1
    ports:
      - "8088:80"
    environment:
      - AUTH_CLIENT_ID=netbird-client
      - AUTH_AUDIENCE=netbird-client
      - AUTH_AUTHORITY=http://localhost:8080/realms/forge
      - AUTH_SUPPORTED_SCOPES=openid profile email offline_access api
      - AUTH_REDIRECT_URI=/callback
      - AUTH_SILENT_REDIRECT_URI=/silent-callback
      - NETBIRD_MGMT_API_ENDPOINT=http://localhost:33073
      - NETBIRD_SIGNAL_ENDPOINT=ws://localhost:10000
      - USE_AUTH0=false
    depends_on:
      - netbird-management
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Coturn (STUN / TURN) ────────────────────────────────────
  coturn:
    image: coturn/coturn:4.11.0
    ports:
      - "${FORGE_COTURN_PORT:-3478}:3478/udp"
    volumes:
      - ./netbird/turnserver.conf:/etc/coturn/turnserver.conf
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3478 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Dozzle (log viewer — LAN-only) ─────────────────────────
  dozzle:
    image: amir20/dozzle:v10.0
    ports:
      - "127.0.0.1:9998:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_ENABLE_ACTIONS=false
      - DOZZLE_ENABLE_SHELL=false
      - DOZZLE_NO_ANALYTICS=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Frontend (React / Vite) ─────────────────────────────────
  frontend:
    build:
      # Contexte = racine workspace : nécessaire pour shared-ui (file:../../shared-ui)
      context: ..
      dockerfile: forge/frontend/Dockerfile
    ports:
      - "${FORGE_FRONTEND_PORT:-3000}:80"
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  netbird_signal_data:
  netbird_mgmt_data:
  etcd_data:
  wal_archive:

networks:
  default:
  proxy_net:
    external: true
    name: proxy_net
