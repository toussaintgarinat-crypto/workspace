version: '3.9'

# Forge standalone — sans NetBird ni Coturn
# Premier lancement : bash setup.sh
# Commandes : make start / make stop / make logs / make reset

services:

  # ── etcd (Patroni DCS — Phase A: single node) ───────────────
  etcd:
    image: bitnami/etcd:3.5
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_NAME: forge-node1
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: "forge-node1=http://etcd:2380"
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: forge-etcd
      ETCD_DATA_DIR: /bitnami/etcd/data
    volumes:
      - etcd_data:/bitnami/etcd
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2379/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── PostgreSQL via Patroni (remplace standalone postgres) ────
  # Phase B : ajouter patroni-replica + etcd nodes HP+N2+Pi → voir docs/runbooks/postgres-failover.md
  postgres:
    build:
      context: ../infra/postgres-ha
    image: patroni-pg16:local
    environment:
      PATRONI_NAME: forge-node1
      PATRONI_SCOPE: forge-pg
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: postgres:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: postgres:5432
      PATRONI_POSTGRESQL_DATA_DIR: /var/lib/postgresql/data
      PATRONI_ETCD3_HOSTS: etcd:2379
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres_super_secret_change_me}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${REPLICATOR_PASSWORD:-replicator_secret_change_me}
      PATRONI_REWIND_USERNAME: rewind_user
      PATRONI_REWIND_PASSWORD: ${REWIND_PASSWORD:-rewind_secret_change_me}
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge_secret_change_this}
      POSTGRES_DB: ${POSTGRES_DB:-forge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - wal_archive:/var/lib/postgresql/wal_archive
      - ../infra/postgres-ha/forge/patroni.yml:/etc/patroni/patroni.yml:ro
    ports:
      - "5432:5432"
      - "8008:8008"
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # ── pgBouncer (pooler façade — prêt Phase B failover) ────────
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p1
    environment:
      DB_USER: ${POSTGRES_USER:-forge}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-forge_secret_change_this}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB:-forge}
      POOL_MODE: session
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
      AUTH_TYPE: md5
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Keycloak (SSO / OIDC) ───────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://pgbouncer:5432/${POSTGRES_DB:-forge}
      - KC_DB_USERNAME=${POSTGRES_USER:-forge}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD:-forge_secret_change_this}
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  # ── Qdrant ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Core API (TypeScript / Bun / Hono) ─────────────────────
  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge_secret_change_this}@pgbouncer:5432/${POSTGRES_DB:-forge}
      - QDRANT_URL=http://qdrant:6333
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-forge}
      - ML_MODULE_URL=http://ml-module:8001
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-ollama}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-llama3.2}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change_this_32_char_random_key!!}
      - GATEWAY_BASE_URL=${GATEWAY_BASE_URL:-http://localhost:4000}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY:-sk-forge}
    depends_on:
      pgbouncer:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── ML Module (Python / FastAPI) ────────────────────────────
  ml-module:
    build:
      context: ./ml-module
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8001/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── MinIO (S3-compatible object storage) ────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9102"
    ports:
      - "9101:9000"
      - "9102:9102"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-forge}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-forge_secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Frontend (React / Vite) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  etcd_data:
  wal_archive:
