version: "3.9"
services:
  redis:
    image: redis:7.4.9-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── etcd (Patroni DCS — Phase A: single node) ───────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_NAME: oria-node1
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: "oria-node1=http://etcd:2380"
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: oria-etcd
      ETCD_DATA_DIR: /var/etcd/data
    volumes:
      - etcd_data:/var/etcd
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── PostgreSQL via Patroni (remplace standalone db) ──────────
  # Phase B : ajouter patroni-replica + etcd nodes HP+N2+Pi → voir docs/runbooks/postgres-failover.md
  db:
    build:
      context: ../infra/postgres-ha
    image: patroni-pg16:local
    environment:
      PATRONI_NAME: oria-node1
      PATRONI_SCOPE: oria-pg
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: db:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: db:5432
      PATRONI_POSTGRESQL_DATA_DIR: /var/lib/postgresql/data
      PATRONI_ETCD3_HOSTS: etcd:2379
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres_super_secret_change_me}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${REPLICATOR_PASSWORD:-replicator_secret_change_me}
      PATRONI_REWIND_USERNAME: rewind_user
      PATRONI_REWIND_PASSWORD: ${REWIND_PASSWORD:-rewind_secret_change_me}
      POSTGRES_USER: ${POSTGRES_USER:-oria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oria_secret}
      POSTGRES_DB: ${POSTGRES_DB:-oria}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - wal_archive:/var/lib/postgresql/wal_archive
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
      - ../infra/postgres-ha/oria/patroni.yml:/etc/patroni/patroni.yml:ro
    ports:
      - "5433:5432"
      - "8009:8008"
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # ── pgBouncer (pooler façade — prêt Phase B failover) ────────
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p1
    environment:
      DB_USER: ${POSTGRES_USER:-oria}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-oria_secret}
      DB_HOST: db
      DB_NAME: ${POSTGRES_DB:-oria}
      POOL_MODE: session
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: scram-sha-256
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      # Repo root pour accéder à ./shared/ (paquet partagé S95).
      context: ..
      dockerfile: oria/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oria}:${POSTGRES_PASSWORD:-oria_secret}@pgbouncer:5432/${POSTGRES_DB:-oria}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3002,http://localhost:3000}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-oria}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-oria-app}
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?Définir LIVEKIT_API_SECRET dans .env (openssl rand -base64 32)}
      MATRIX_HOMESERVER_URL: http://dendrite:8008
      MATRIX_SERVER_NAME: ${MATRIX_SERVER_NAME:-oria.local}
      MATRIX_AS_TOKEN: ${MATRIX_AS_TOKEN:?Définir MATRIX_AS_TOKEN dans .env (openssl rand -hex 32)}
      MATRIX_HS_TOKEN: ${MATRIX_HS_TOKEN:?Définir MATRIX_HS_TOKEN dans .env (openssl rand -hex 32)}
      FORGE_TOKEN: ${FORGE_TOKEN:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_healthy
      dendrite:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dendrite:
    build: ./matrix
    ports:
      - "8010:8008"
    environment:
      MATRIX_SERVER_NAME: ${MATRIX_SERVER_NAME:-oria.local}
      MATRIX_AS_TOKEN: ${MATRIX_AS_TOKEN:?Définir MATRIX_AS_TOKEN dans .env (openssl rand -hex 32)}
      MATRIX_HS_TOKEN: ${MATRIX_HS_TOKEN:?Définir MATRIX_HS_TOKEN dans .env (openssl rand -hex 32)}
      MATRIX_REGISTRATION_SHARED_SECRET: ${MATRIX_REGISTRATION_SHARED_SECRET:-oria_local_dev_only_change_in_prod}
      MATRIX_REGISTRATION_DISABLED: ${MATRIX_REGISTRATION_DISABLED:-true}
      POSTGRES_USER: ${POSTGRES_USER:-oria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oria_secret}
    volumes:
      - ./matrix/dendrite.yaml.tpl:/etc/dendrite/dendrite.yaml.tpl:ro
      - ./matrix/appservice.yaml.tpl:/etc/dendrite/appservice.yaml.tpl:ro
      - dendrite_keys:/var/dendrite/keys
      - dendrite_media:/var/dendrite/media
      - dendrite_nats:/var/dendrite/nats
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8008/_matrix/client/versions >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── Keycloak (SSO / inscription publique) ───────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    command: start-dev --import-realm
    ports:
      - "8081:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-oria}
      KC_DB_USERNAME: ${POSTGRES_USER:-oria}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-oria_secret}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8080' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  # ── MinIO (S3-compatible object storage) ─────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9103"
    ports:
      - "9106:9000"
      - "9107:9103"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-oria}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-oria_secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ../
      dockerfile: oria/frontend/Dockerfile
    ports:
      - "3002:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
      VITE_LIVEKIT_URL: ws://localhost:7880
      VITE_MATRIX_URL: http://localhost:8010
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8081}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-oria}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-oria-app}
    volumes:
      - ./frontend:/workspace/oria/frontend
      - ../shared-ui:/workspace/shared-ui
      - /workspace/oria/frontend/node_modules
    command: npm run dev -- --host
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:v1.12.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 7880 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  dendrite_keys:
  dendrite_media:
  dendrite_nats:
  minio_data:
  etcd_data:
  wal_archive:
