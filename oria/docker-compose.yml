version: "3.9"
services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oria}
      POSTGRES_USER: ${POSTGRES_USER:-oria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oria_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oria -d oria"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oria}:${POSTGRES_PASSWORD:-oria_secret}@db:5432/${POSTGRES_DB:-oria}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3002,http://localhost:3000}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-oria}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-oria-app}
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?Définir LIVEKIT_API_SECRET dans .env (openssl rand -base64 32)}
      MATRIX_HOMESERVER_URL: http://synapse:8008
      MATRIX_SERVER_NAME: ${MATRIX_SERVER_NAME:-oria.local}
      MATRIX_AS_TOKEN: ${MATRIX_AS_TOKEN:?Définir MATRIX_AS_TOKEN dans .env (openssl rand -hex 32)}
      MATRIX_HS_TOKEN: ${MATRIX_HS_TOKEN:?Définir MATRIX_HS_TOKEN dans .env (openssl rand -hex 32)}
      FORGE_TOKEN: ${FORGE_TOKEN:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
      synapse:
        condition: service_started
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  synapse:
    image: matrixdotorg/synapse:v1.152.1
    ports:
      - "8008:8008"
    volumes:
      - ./matrix/synapse_data:/data
    depends_on:
      - synapse_db
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml

  synapse_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${SYNAPSE_DB_PASSWORD:-synapse_secret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - synapse_pg_data:/var/lib/postgresql/data

  # ── MinIO (S3-compatible object storage) ─────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9103"
    ports:
      - "9106:9000"
      - "9107:9103"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-oria}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-oria_secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    ports:
      - "3002:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
      VITE_LIVEKIT_URL: ws://localhost:7880
      VITE_MATRIX_URL: http://localhost:8008
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8080}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-oria}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-oria-app}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  livekit:
    image: livekit/livekit-server:v1.12.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml

volumes:
  postgres_data:
  uploads_data:
  synapse_pg_data:
  minio_data:
