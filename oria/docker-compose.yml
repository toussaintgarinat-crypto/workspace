version: "3.9"
services:
  redis:
    image: redis:7.4.9-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  db:
    image: postgres:16.14-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oria}
      POSTGRES_USER: ${POSTGRES_USER:-oria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oria_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oria -d oria"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oria}:${POSTGRES_PASSWORD:-oria_secret}@db:5432/${POSTGRES_DB:-oria}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3002,http://localhost:3000}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-oria}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-oria-app}
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?Définir LIVEKIT_API_SECRET dans .env (openssl rand -base64 32)}
      MATRIX_HOMESERVER_URL: http://dendrite:8008
      MATRIX_SERVER_NAME: ${MATRIX_SERVER_NAME:-oria.local}
      MATRIX_AS_TOKEN: ${MATRIX_AS_TOKEN:?Définir MATRIX_AS_TOKEN dans .env (openssl rand -hex 32)}
      MATRIX_HS_TOKEN: ${MATRIX_HS_TOKEN:?Définir MATRIX_HS_TOKEN dans .env (openssl rand -hex 32)}
      FORGE_TOKEN: ${FORGE_TOKEN:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_healthy
      dendrite:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dendrite:
    build: ./matrix
    ports:
      - "8008:8008"
    environment:
      MATRIX_SERVER_NAME: ${MATRIX_SERVER_NAME:-oria.local}
      MATRIX_AS_TOKEN: ${MATRIX_AS_TOKEN:?Définir MATRIX_AS_TOKEN dans .env (openssl rand -hex 32)}
      MATRIX_HS_TOKEN: ${MATRIX_HS_TOKEN:?Définir MATRIX_HS_TOKEN dans .env (openssl rand -hex 32)}
      MATRIX_REGISTRATION_SHARED_SECRET: ${MATRIX_REGISTRATION_SHARED_SECRET:-oria_local_dev_only_change_in_prod}
      MATRIX_REGISTRATION_DISABLED: ${MATRIX_REGISTRATION_DISABLED:-true}
      POSTGRES_USER: ${POSTGRES_USER:-oria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oria_secret}
    volumes:
      - ./matrix/dendrite.yaml.tpl:/etc/dendrite/dendrite.yaml.tpl:ro
      - ./matrix/appservice.yaml.tpl:/etc/dendrite/appservice.yaml.tpl:ro
      - dendrite_keys:/var/dendrite/keys
      - dendrite_media:/var/dendrite/media
      - dendrite_nats:/var/dendrite/nats
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8008/_matrix/client/versions >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── Keycloak (SSO / inscription publique) ───────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    command: start-dev --import-realm
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-oria}
      KC_DB_USERNAME: ${POSTGRES_USER:-oria}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-oria_secret}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  # ── MinIO (S3-compatible object storage) ─────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9103"
    ports:
      - "9106:9000"
      - "9107:9103"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-oria}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-oria_secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3002:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
      VITE_LIVEKIT_URL: ws://localhost:7880
      VITE_MATRIX_URL: http://localhost:8008
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8081}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-oria}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-oria-app}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:v1.12.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7880/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  dendrite_keys:
  dendrite_media:
  dendrite_nats:
  minio_data:
