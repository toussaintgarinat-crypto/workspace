name: CI/CD — Assistant

on:
  push:
    branches: [main]
    paths:
      - 'assistant/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

env:
  IMAGE_BACKEND: ghcr.io/toussaintgarinat-crypto/workspace/assistant-backend
  IMAGE_FRONTEND: ghcr.io/toussaintgarinat-crypto/workspace/assistant-frontend

jobs:
  # ── Build & push images vers GHCR ─────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: assistant/backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: assistant/frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ── Deploy SSH (skippé si SERVER_HOST non configuré) ──────────
  # Requires: vars.SERVER_HOST (repository variable), secrets.SERVER_HOST (secret),
  #           secrets.SSH_USER, secrets.SSH_PRIVATE_KEY, secrets.GHCR_TOKEN
  deploy:
    name: Deploy via SSH
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.SERVER_HOST != '' }}

    steps:
      - name: Pull & redeploy
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SCALE_N: ${{ vars.SCALE_N || '1' }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,SCALE_N
          script: |
            set -e
            cd "${{ vars.DEPLOY_PATH || '$HOME/workspace' }}"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            make deploy-assistant N=$SCALE_N

      - name: Smoke test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            curl -sf --retry 5 --retry-delay 3 --retry-connrefused http://localhost:8200/health
