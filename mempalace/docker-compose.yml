version: '3.9'

# MemPalace standalone
# Premier lancement : bash setup.sh
# Commandes : make start / make stop / make logs / make reset

services:

  # ── Qdrant ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6334:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible object storage) ─────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9101"
    ports:
      - "9100:9000"
      - "9101:9101"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-mempalace}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-mempalace_secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MemPalace API ────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8100:8100"
    env_file:
      - path: .env
        required: false
    environment:
      - MEMPALACE_QDRANT_URL=http://qdrant:6333
      - MEMPALACE_PALACE_BASE=/data/palaces
      - MEMPALACE_DB_PATH=/data/users.db
      - JWT_SECRET=${JWT_SECRET:-change_this_in_production}
      - MEMPALACE_ADMIN_TOKEN=${MEMPALACE_ADMIN_TOKEN:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      # Storage: "local" (default) or "s3" (MinIO)
      - MEMPALACE_STORAGE=${MEMPALACE_STORAGE:-local}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-mempalace}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-mempalace_secret}
      - S3_BUCKET=${S3_BUCKET:-mempalace}
    volumes:
      - palace_data:/data
      - fastembed_cache:/root/.cache/fastembed
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  qdrant_data:
  palace_data:
  fastembed_cache:
  minio_data:
