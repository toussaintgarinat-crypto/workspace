services:

  # ── Alertmanager-init : envsubst du template (Alertmanager n'expand pas ${VAR}) ─
  alertmanager-init:
    image: alpine:3.20
    command:
      - "sh"
      - "-c"
      - "apk add --no-cache gettext >/dev/null && envsubst < /tpl/alertmanager.yml.tpl > /out/alertmanager.yml && echo 'alertmanager.yml rendu'"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-placeholder}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-1}
    volumes:
      - ./alertmanager:/tpl:ro
      - alertmanager_config:/out
    networks:
      - observability_net

  # ── Alertmanager — routing + Telegram ────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    depends_on:
      alertmanager-init:
        condition: service_completed_successfully
    volumes:
      - alertmanager_config:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    networks:
      - observability_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Node Exporter — métriques host (disque, RAM, CPU) ────────
  node-exporter:
    image: prom/node-exporter:v1.9.0
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - observability_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9100/metrics >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Prometheus — scrape backend + redis ──────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - ./prometheus/continuity.yml:/etc/prometheus/continuity.yml:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      alertmanager:
        condition: service_healthy
    networks:
      - observability_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis Exporter ────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.83.0
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    networks:
      - observability_net
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "/redis_exporter", "--version"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Blackbox Exporter — probes HTTP/TCP/ICMP par composant ──
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    networks:
      - observability_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9115/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Postgres Exporter (optionnel — activé si DATABASE_URL set) ─
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=${ASSISTANT_DATABASE_URL:-}
    networks:
      - observability_net
    profiles:
      - postgres
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9187/metrics >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Grafana — dashboards + Keycloak OIDC ─────────────────────
  grafana:
    image: grafana/grafana:11.6.14-security-04
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3100}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-change_this}
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      # Keycloak OIDC (activé si GF_AUTH_GENERIC_OAUTH_ENABLED=true)
      - GF_AUTH_GENERIC_OAUTH_ENABLED=${GF_AUTH_GENERIC_OAUTH_ENABLED:-false}
      - GF_AUTH_GENERIC_OAUTH_NAME=Keycloak
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GF_AUTH_GENERIC_OAUTH_CLIENT_ID:-grafana}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:-}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid email profile roles
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=${KEYCLOAK_URL:-http://localhost:8080}/realms/${KEYCLOAK_REALM:-forge}/protocol/openid-connect/auth
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=${KEYCLOAK_URL:-http://localhost:8080}/realms/${KEYCLOAK_REALM:-forge}/protocol/openid-connect/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=${KEYCLOAK_URL:-http://localhost:8080}/realms/${KEYCLOAK_REALM:-forge}/protocol/openid-connect/userinfo
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(roles[*], 'admin') && 'Admin' || 'Viewer'
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - observability_net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  alertmanager_config:

networks:
  observability_net:
    external: true
    name: observability_net
