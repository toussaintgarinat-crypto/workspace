groups:

  # ── Probes HTTP via blackbox-exporter (RTO par composant) ─────────
  - name: continuity_probes
    interval: 30s
    rules:

      - alert: ProbeDown
        expr: probe_success == 0
        for: 1m
        labels:
          severity: warning
          tier: probe
        annotations:
          summary: "Probe HTTP {{ $labels.instance }} échoue"
          description: "blackbox-exporter ne joint plus {{ $labels.instance }} ({{ $labels.module }}) depuis 1min."

      - alert: ProbeDownCritical
        expr: probe_success{tier="critical"} == 0
        for: 2m
        labels:
          severity: critical
          tier: probe
        annotations:
          summary: "Composant CRITIQUE {{ $labels.instance }} DOWN"
          description: "{{ $labels.instance }} down depuis 2min — déclencher runbook bascule."

      - alert: ProbeLatencyHigh
        expr: probe_duration_seconds > 2
        for: 5m
        labels:
          severity: warning
          tier: probe
        annotations:
          summary: "Latence probe {{ $labels.instance }} > 2s"
          description: "Probe {{ $labels.instance }} : {{ printf \"%.2f\" $value }}s — vérifier saturation réseau ou service."

      - alert: TLSCertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 14
        for: 1h
        labels:
          severity: warning
          tier: tls
        annotations:
          summary: "Certificat TLS {{ $labels.instance }} expire dans < 14j"
          description: "Renouvellement Let's Encrypt à vérifier sur Traefik."

      - alert: TLSCertExpired
        expr: probe_ssl_earliest_cert_expiry - time() < 0
        for: 5m
        labels:
          severity: critical
          tier: tls
        annotations:
          summary: "Certificat TLS {{ $labels.instance }} EXPIRÉ"
          description: "Service inaccessible en HTTPS — fix Traefik immédiat."

  # ── Postgres réplication / disponibilité (préparation S87) ─────────
  - name: continuity_postgres
    interval: 30s
    rules:

      - alert: PostgresDown
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
          tier: data
        annotations:
          summary: "Postgres {{ $labels.instance }} DOWN"
          description: "Cœur de MemPalace/Oria/Forge inaccessible — runbook S87 failover."

      - alert: PostgresReplicationLagHigh
        expr: pg_replication_lag_seconds > 30
        for: 2m
        labels:
          severity: warning
          tier: data
        annotations:
          summary: "Replication PG lag > 30s sur {{ $labels.instance }}"
          description: "Lag : {{ printf \"%.1f\" $value }}s — risque RPO dégradé."

      - alert: PostgresTooManyConnections
        expr: sum by (instance) (pg_stat_activity_count) / on(instance) pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          tier: data
        annotations:
          summary: "Postgres {{ $labels.instance }} > 80% connexions"
          description: "{{ printf \"%.1f\" $value }} × max_connections — risque saturation pool."

  # ── Backups freshness (S82) ───────────────────────────────────────
  - name: continuity_backups
    interval: 5m
    rules:

      - alert: BackupTooOld
        expr: time() - assistant_backup_last_success_timestamp_seconds > 86400 * 2
        for: 10m
        labels:
          severity: warning
          tier: backup
        annotations:
          summary: "Dernier backup > 48h"
          description: "Le dernier backup réussi date de {{ printf \"%.1f\" $value }}s. Vérifier cron / restic push."

      - alert: BackupMissing
        expr: absent(assistant_backup_last_success_timestamp_seconds)
        for: 1h
        labels:
          severity: critical
          tier: backup
        annotations:
          summary: "Aucune métrique backup connue"
          description: "Le backup n'a peut-être jamais tourné, ou l'exporter est cassé."

  # ── Saturation infra (early warning bascule) ──────────────────────
  - name: continuity_capacity
    interval: 1m
    rules:

      - alert: CPULoadVeryHigh
        expr: 100 * (1 - avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 90
        for: 10m
        labels:
          severity: warning
          tier: capacity
        annotations:
          summary: "CPU {{ $labels.instance }} > 90% pendant 10min"
          description: "Saturation soutenue — envisager bascule charge sur node 2."

      - alert: NodeFilesystemNearFull
        expr: >
          (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
          tier: capacity
        annotations:
          summary: "Disque {{ $labels.mountpoint }} < 10% libre"
          description: "Espace : {{ printf \"%.1f\" $value }}% — backups vont échouer, intervention requise."
