groups:

  - name: services
    interval: 1m
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} DOWN"
          description: "{{ $labels.job }} ({{ $labels.instance }}) injoignable depuis 2min."

  - name: resources
    interval: 1m
    rules:
      - alert: DiskSpaceLow
        expr: >
          (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}) * 100 < 20
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disque {{ $labels.mountpoint }} < 20% libre"
          description: "Espace libre : {{ printf \"%.1f\" $value }}% sur {{ $labels.mountpoint }}"

      - alert: MemoryPressureHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAM > 90%"
          description: "RAM utilisée : {{ printf \"%.1f\" $value }}%"

  - name: application
    interval: 1m
    rules:
      - alert: RAGLatencyHigh
        expr: histogram_quantile(0.95, rate(rag_query_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latence RAG P95 > 5s"
          description: "P95 latence RAG : {{ printf \"%.2f\" $value }}s"

  - name: data_tier
    interval: 1m
    rules:
      - alert: QdrantDown
        expr: probe_success{job="blackbox", instance=~".*:6333.*|.*qdrant.*"} == 0
        for: 2m
        labels:
          severity: critical
          degraded: "true"
          component: rag
        annotations:
          summary: "Qdrant DOWN — MemPalace en mode dégradé keyword"
          description: "Qdrant injoignable depuis 2min. La recherche sémantique est indisponible. Fallback ILIKE actif si QDRANT_FALLBACK_ENABLED=true."

      - alert: MinioDown
        expr: probe_success{job="blackbox", instance=~".*:9000.*|.*minio.*"} == 0
        for: 2m
        labels:
          severity: critical
          degraded: "true"
          component: tools
        annotations:
          summary: "MinIO DOWN — uploads en mode dégradé local"
          description: "MinIO injoignable depuis 2min. Les uploads sont redirigés vers le filesystem local (FallbackStorage)."

      - alert: DegradedModeProlonged
        expr: degraded_component_active > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Mode dégradé actif > 30min sur {{ $labels.service }}/{{ $labels.component }}"
          description: "Le composant {{ $labels.component }} du service {{ $labels.service }} est en mode dégradé depuis plus de 30min. Vérifier la cause racine."

      - alert: QdrantSnapshotStale
        expr: (time() - qdrant_last_snapshot_timestamp) > 7200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Snapshot Qdrant > 2h"
          description: "Dernier snapshot Qdrant il y a {{ printf \"%.0f\" $value }}s (> 2h). Vérifier make qdrant-snapshot."

  - name: entry_tier
    interval: 30s
    rules:
      - alert: TraefikHPDown
        expr: probe_success{job="blackbox_public", node="traefik-hp"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Traefik HP G4 DOWN"
          description: "Traefik HP G4 SFF injoignable depuis 1min. Vérifier make traefik-failover-drill. DNS failover en cours si cloudflare-monitor actif."

      - alert: BothNodesDown
        expr: >
          probe_success{job="blackbox_public", node="traefik-hp"} == 0
          and probe_success{job="blackbox_public", node="traefik-n2"} == 0
        for: 30s
        labels:
          severity: page
        annotations:
          summary: "BOTH NODES DOWN — page maintenance active"
          description: "HP G4 SFF + Node 2 injoignables depuis 30s. Page maintenance Cloudflare Pages doit être visible. Runbook: docs/runbooks/traefik-failover.md (Plan D)."

      - alert: CertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry{job="blackbox_public"} - time() < 14 * 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Certificat TLS expire dans < 14j"
          description: "Certificat {{ $labels.instance }} expire dans {{ printf \"%.0f\" $value }}s. Vérifier renouvellement ACME (make acme-sync si Node 2 actif)."

  # ── Jobs durables Redis Streams (S125) ────────────────────────────────
  - name: jobs
    interval: 1m
    rules:
      - alert: JobQueueBacklog
        expr: job_queue_depth > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "File de jobs {{ $labels.namespace }}:{{ $labels.stream }} en backlog"
          description: "Profondeur {{ $value }} (> 100) depuis 10min — les consumers ne suivent pas. Scaler les workers ou vérifier qu'ils tournent."

      - alert: JobQueuePendingStuck
        expr: job_queue_pending > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Messages en attente d'ack sur {{ $labels.namespace }}:{{ $labels.stream }}"
          description: "{{ $value }} messages livrés mais non acquittés depuis 10min — workers bloqués/lents ou jobs qui échouent en boucle (vérifier la DLQ)."

      - alert: JobDLQNotEmpty
        expr: job_dlq_size > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Dead-letter queue non vide : {{ $labels.namespace }}:{{ $labels.stream }}"
          description: "{{ $value }} job(s) en DLQ (échec après retries). Inspecter le stream {{ $labels.namespace }}:jobs:{{ $labels.stream }}:dlq."
