global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules.yml
  - /etc/prometheus/continuity.yml

scrape_configs:

  - job_name: "assistant-backend"
    static_configs:
      - targets: ["backend:8200"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Blackbox probes (continuité S86) ─────────────────────────
  # Probes HTTP internes (services sur observability_net) — déclenche ProbeDown
  - job_name: "blackbox_internal"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://backend:8200/health
        labels:
          tier: critical
          layer: app
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Probes HTTPS via Traefik — cibles définies dans targets/blackbox-public.yml
  - job_name: "blackbox_public"
    metrics_path: /probe
    params:
      module: [http_2xx_tls]
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/blackbox-public.yml
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
