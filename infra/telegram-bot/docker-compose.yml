services:
  telegram-bot:
    build: .
    image: telegram-bot:latest
    container_name: telegram-bot
    restart: unless-stopped
    # Endpoint /health exposé en interne via aiohttp (Sprint 94)
    ports:
      - "127.0.0.1:${TELEGRAM_HEALTH_PORT:-9090}:${TELEGRAM_HEALTH_PORT:-9090}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${TELEGRAM_HEALTH_PORT:-9090}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      TELEGRAM_HEALTH_PORT: ${TELEGRAM_HEALTH_PORT:-9090}
      ASSISTANT_URL: ${ASSISTANT_URL:-http://assistant}
      MEMPALACE_URL: ${MEMPALACE_URL:-http://mempalace}
      ORIA_URL: ${ORIA_URL:-http://oria}
      ONCALL_NAME: ${ONCALL_NAME:-Toussaint}
      RUNBOOKS_DIR: /app/runbooks
      CHAOS_SCRIPTS_DIR: /app/chaos
      # PostgreSQL (pour pg_isready si installé dans l'image)
      PGHOST: ${PGHOST:-postgres}
      PGPORT: ${PGPORT:-5432}
    volumes:
      # Accès aux runbooks du projet
      - ../../docs/runbooks:/app/runbooks:ro
      # Accès aux scripts chaos
      - ../../scripts/chaos:/app/chaos:ro
    networks:
      - proxy_net
      - observability_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy_net:
    external: true
    name: proxy_net
  observability_net:
    external: true
    name: observability_net
