<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance — Agent Personnel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f11;
      color: #e2e2e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 1.5rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
      background: #1a1a1f;
      border: 1px solid #2a2a32;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f0f0f5;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #8888a0;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #111117;
      border: 1px solid #2a2a32;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      text-align: left;
      font-size: 0.875rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.red    { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    .dot.yellow { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }
    .dot.green  { background: #22c55e; box-shadow: 0 0 6px #22c55e; }

    .status-label { color: #c4c4d0; flex: 1; }
    .status-value { color: #8888a0; font-size: 0.8rem; }

    .divider { border: none; border-top: 1px solid #2a2a32; margin: 1.5rem 0; }

    .links { display: flex; flex-direction: column; gap: 0.75rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.7rem 1.25rem;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: #5b5bd6; color: #fff; }
    .btn-ghost   { background: transparent; border: 1px solid #2a2a32; color: #c4c4d0; }

    .footer {
      margin-top: 2rem;
      font-size: 0.775rem;
      color: #55555f;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#x1F527;</div>
    <h1>Maintenance en cours</h1>
    <p class="subtitle">
      L'agent personnel est temporairement indisponible.<br>
      L'équipe travaille au rétablissement du service.
    </p>

    <div class="status-row">
      <span class="dot red"></span>
      <span class="status-label">Serveur principal</span>
      <span class="status-value">Indisponible</span>
    </div>
    <div class="status-row">
      <span class="dot yellow"></span>
      <span class="status-label">Restauration en cours</span>
      <span class="status-value">ETA : dès que possible</span>
    </div>
    <div class="status-row">
      <span class="dot green"></span>
      <span class="status-label">Données</span>
      <span class="status-value">Protégées (backups)</span>
    </div>

    <hr class="divider">

    <div class="links">
      <a class="btn btn-primary" href="https://t.me/votre_bot_status" target="_blank" rel="noopener">
        &#x1F4AC; Suivre sur Telegram
      </a>
      <a class="btn btn-ghost" href="mailto:toussaintgarinat@gmail.com?subject=Agent%20Personnel%20%E2%80%94%20Maintenance">
        &#x2709;&#xFE0F; Contacter
      </a>
    </div>

    <p class="footer">
      Dernière mise à jour : <span id="ts">—</span>
    </p>
  </div>

  <script>
    const d = new Date();
    document.getElementById('ts').textContent =
      d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
      ' à ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  </script>
</body>
</html>
