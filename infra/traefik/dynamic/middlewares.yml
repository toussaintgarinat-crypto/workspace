# ── Middlewares partagés ──────────────────────────────────────────────────────

http:
  middlewares:

    # Auth endpoints (login, register) : 20 req/min par IP
    rate-limit-auth:
      rateLimit:
        average: 20
        period: 1m
        burst: 5

    # API générale (chat, search) : 60 req/min par IP
    rate-limit-api:
      rateLimit:
        average: 60
        period: 1m
        burst: 20
