# ── LXC mempalace : 10.10.10.30 ──────────────────────────────────────────────

http:
  routers:
    mempalace-api:
      rule: 'Host(`palace.{{ env "DOMAIN" }}`)'
      entryPoints: [websecure]
      middlewares: [rate-limit-api]
      service: mempalace-api
      tls:
        certResolver: letsencrypt

  services:
    mempalace-api:
      loadBalancer:
        servers:
          - url: "http://10.10.10.30:8100"
