version: '3.9'

# VM-Reverse-Proxy — IP Proxmox interne : 10.10.10.2
# Ports à forwarder depuis la box : 80, 443, 10000, 33073, 3478/udp

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "10000:10000"
      - "33073:33073"
      - "3478:3478/udp"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./users:/etc/traefik/users:ro
      - letsencrypt:/letsencrypt

volumes:
  letsencrypt:
