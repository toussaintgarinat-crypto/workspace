version: '3.9'

# VM-Reverse-Proxy — IP Proxmox interne : 10.10.10.2
# Ports à forwarder depuis la box : 80, 443, 10000, 33073, 3478/udp

services:
  traefik:
    image: traefik:v3.3.7
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "10000:10000"
      - "33073:33073"
      - "3478:3478/udp"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./users:/etc/traefik/users:ro
      - letsencrypt:/letsencrypt
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/ping >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  letsencrypt:
